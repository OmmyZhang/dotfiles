general {
    hide_cursor = true
}

background {
    monitor =
    path = screenshot
    #path = ~/Pictures/wallpaper/IMG20230918092502.jpg
    blur_passes = 3
    brightness = 0.7
    noise = 0.03
}

# DATE
label {
  monitor =
  text = cmd[update:60000] echo "$(date +"%A, %B %d")"
  color = rgba(242, 243, 244, 0.75)
  font_size = 22
  font_family = JetBrains Mono
  position = 0, 300
  halign = center
  valign = center
}


# TIME
label {
  monitor = 
  text = $TIME12
  color = rgba(242, 243, 244, 0.75)
  font_size = 95
  font_family = JetBrains Mono Extrabold
  position = 0, 200
  halign = center
  valign = center
}


# INPUT FIELD
input-field {
    monitor =
    size = 250, 60
    outline_thickness = 2
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.35 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgba(255, 255, 255, 0.01)
    inner_color = rgba(255, 255, 255, 0.05)
    #fade_on_empty = false
    rounding = -1
    check_color = rgb(204, 136, 34)
    placeholder_text = 
    hide_input = false
    position = 0, -30
    halign = center
    valign = center
}

#NUS NEXT BUS
label {
    monitor = 
    text = cmd[update: 29123] hyprctl monitors | grep -q 'dpmsStatus: 1' && ~/scripts/query_nus_nextbus.py LT27 | sed '2,$ s/^/• /'
    color = rgba(220, 220, 255, 0.75)
    font_size = 36
    font_family = CodeNewRoman Nerd Font Propo
    position = -320, -400
    halign = center
    valign = center

    shadow_passes = 4               # Number of passes (1-5 recommended)
    shadow_size = 7                 # Size of the shadow
    shadow_color = rgb(128,128,128) # Color of the shadow
    shadow_boost = 7.5              # Opacity boost
}

label {
    monitor = 
