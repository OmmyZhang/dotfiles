[remember]
username = true
session = true

[secret]
mode = "characters"  # "hidden" or "characters"
characters = "_ "

[theme]
border = "bright-blue"
text = "green"
time = "grey"
container = "black"
title = "cyan"
greet = "yellow"
prompt = "green"
input = "white"
action= "grey"
button = "yellow"
